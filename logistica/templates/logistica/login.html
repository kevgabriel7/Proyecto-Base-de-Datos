{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Envíos UNAH</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'logistica/css/styles.css' %}?v=1.7">
</head>
<body class="login-body">

    <div class="card login-card">
        <div class="logo-title"><i class="bi bi-box-seam-fill"></i> Envíos UNAH</div>

        <h4 class="login-title">Iniciar sesión</h4>
        <p class="login-sub">Entrá con tu correo y contraseña</p>

        {% if error %}
        <div class="alert alert-danger py-2" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Correo</label>
                <input type="text" class="form-control" id="email" name="email" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 text-white">Entrar</button>
        </form>
    </div>

</body>
</html>
